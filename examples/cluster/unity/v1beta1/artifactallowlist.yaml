apiVersion: unity.databricks.crossplane.io/v1beta1
kind: ArtifactAllowlist
metadata:
  annotations:
    meta.upbound.io/example-id: unity/v1beta1/artifactallowlist
  labels:
    testing.upbound.io/example-name: init_scripts
  name: init-scripts
spec:
  forProvider:
    artifactMatcher:
    - artifact: /Volumes/inits
      matchType: PREFIX_MATCH
    artifactType: INIT_SCRIPT
