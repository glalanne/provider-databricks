apiVersion: unity.databricks.crossplane.io/v1alpha2
kind: WorkspaceBinding
metadata:
  annotations:
    meta.upbound.io/example-id: unity/v1alpha2/workspacebinding
  labels:
    testing.upbound.io/example-name: sandbox
  name: sandbox
spec:
  forProvider:
    securableNameSelector:
      matchLabels:
        testing.upbound.io/example-name: sandbox
    workspaceIdSelector:
      matchLabels:
        testing.upbound.io/example-name: other

---

apiVersion: unity.databricks.crossplane.io/v1alpha2
kind: Catalog
metadata:
  annotations:
    meta.upbound.io/example-id: unity/v1alpha2/workspacebinding
  labels:
    testing.upbound.io/example-name: sandbox
  name: sandbox
spec:
  forProvider:
    isolationMode: ISOLATED
    name: sandbox
