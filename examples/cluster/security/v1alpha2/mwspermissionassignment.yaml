apiVersion: security.databricks.crossplane.io/v1alpha2
kind: MwsPermissionAssignment
metadata:
  annotations:
    meta.upbound.io/example-id: security/v1alpha2/mwspermissionassignment
  labels:
    testing.upbound.io/example-name: add_admin_group
  name: add-admin-group
spec:
  forProvider:
    permissions:
    - ADMIN
    principalIdSelector:
      matchLabels:
        testing.upbound.io/example-name: data_eng
    workspaceIdSelector:
      matchLabels:
        testing.upbound.io/example-name: this

---

apiVersion: security.databricks.crossplane.io/v1alpha2
kind: Group
metadata:
  annotations:
    meta.upbound.io/example-id: security/v1alpha2/mwspermissionassignment
  labels:
    testing.upbound.io/example-name: data_eng
  name: data-eng
spec:
  forProvider:
    displayName: Data Engineering
