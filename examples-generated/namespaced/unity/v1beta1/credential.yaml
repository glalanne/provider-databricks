apiVersion: unity.databricks.m.crossplane.io/v1beta1
kind: Credential
metadata:
  annotations:
    meta.upbound.io/example-id: unity/v1beta1/credential
  labels:
    testing.upbound.io/example-name: external
  name: external
  namespace: upbound-system
spec:
  forProvider:
    awsIamRole:
      roleArn: ${aws_iam_role.external_data_access.arn}
    comment: Managed by TF
    name: ${aws_iam_role.external_data_access.name}
    purpose: SERVICE

---

apiVersion: unity.databricks.m.crossplane.io/v1beta1
kind: GrantMap
metadata:
  annotations:
    meta.upbound.io/example-id: unity/v1beta1/credential
  labels:
    testing.upbound.io/example-name: external_creds
  name: external-creds
  namespace: upbound-system
spec:
  forProvider:
    credentialSelector:
      matchLabels:
        testing.upbound.io/example-name: external
    grant:
    - principalSelector:
        matchLabels:
          testing.upbound.io/example-name: example
      privileges:
      - ACCESS
