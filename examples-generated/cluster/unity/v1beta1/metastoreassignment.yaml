apiVersion: unity.databricks.crossplane.io/v1beta1
kind: MetastoreAssignment
metadata:
  annotations:
    meta.upbound.io/example-id: unity/v1beta1/metastoreassignment
  labels:
    testing.upbound.io/example-name: this
  name: this
spec:
  forProvider:
    metastoreIdSelector:
      matchLabels:
        testing.upbound.io/example-name: this
    workspaceId: ${local.workspace_id}

---

apiVersion: unity.databricks.crossplane.io/v1beta1
kind: Metastore
metadata:
  annotations:
    meta.upbound.io/example-id: unity/v1beta1/metastoreassignment
  labels:
    testing.upbound.io/example-name: this
  name: this
spec:
  forProvider:
    forceDestroy: true
    name: primary
    owner: uc admins
    region: us-east-1
    storageRoot: s3://${aws_s3_bucket.metastore.id}/metastore
